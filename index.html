<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SayaJove Modern Nadi Astrology</title>
    <style>
        :root { 
            --primary: #1a237e; 
            --accent: #ffd600; 
            --bg: #eceff1; 
            --line: #37474f; 
            --benefic: #2e7d32;
            --malefic: #c62828;
            --shadow: 0 8px 24px rgba(0,0,0,0.12);
        } 
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: var(--bg); 
            padding: 15px; 
            margin: 0;
        } 
        .container { 
            max-width: 700px; 
            margin: 20px auto; 
            background: white; 
            padding: 25px; 
            border-radius: 20px; 
            box-shadow: var(--shadow); 
        } 
        .header-title {
            text-align: center;
            color: var(--primary);
            font-weight: bold;
            margin-bottom: 20px;
            font-size: 22px;
            border-bottom: 3px solid var(--accent);
            padding-bottom: 10px;
        }
        .input-group {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            align-items: center;
        }
        .input-field {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        .input-field label {
            font-size: 12px;
            font-weight: bold;
            color: var(--line);
        }
        input { 
            padding: 12px; 
            border: 2px solid #cfd8dc; 
            border-radius: 8px; 
            font-size: 15px;
            outline: none;
            transition: 0.3s;
            background: #fafafa;
        } 
        input:focus { 
            border-color: var(--primary); 
            background: #fff;
        }
        
        button { 
            background: #2e7d32; 
            color: white; 
            border: none; 
            padding: 12px 25px; 
            border-radius: 8px; 
            cursor: pointer; 
            font-size: 16px; 
            font-weight: bold; 
            transition: 0.3s;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            margin-top: 18px;
        } 
        button:hover { background: #1b5e20; transform: translateY(-2px); } 

        .chart-grid { 
            display: grid; 
            grid-template-columns: repeat(4, 1fr); 
            border: 3px solid var(--line); 
            margin: 25px 0; 
            border-radius: 8px;
            overflow: hidden;
            background: #fff;
        } 
        .house { 
            border: 1px solid #b0bec5; 
            height: 95px; 
            padding: 6px; 
            font-size: 12px; 
            position: relative; 
            background: #fff; 
            display: flex;
            flex-direction: column;
            gap: 2px;
            overflow-y: auto;
        } 
        .house-id { 
            position: absolute; 
            bottom: 2px; 
            right: 5px; 
            color: #cfd8dc; 
            font-weight: bold; 
            font-size: 14px;
            pointer-events: none;
        } 
        .p-tag { 
            font-weight: bold; 
            display: inline-block; 
            margin: 1px;
            padding: 2px 4px;
            border-radius: 4px;
            background: #f0f4f8;
            font-size: 11px;
        } 
        .p-benefic { color: var(--benefic); border-left: 2px solid var(--benefic); }
        .p-malefic { color: var(--malefic); border-left: 2px solid var(--malefic); }
        .p-neutral { color: #37474f; border-left: 2px solid #78909c; }

        .center-box { 
            grid-column: 2 / 4; 
            grid-row: 2 / 4; 
            display: flex; 
            flex-direction: column;
            align-items: center; 
            justify-content: center; 
            background: #f8f9fa; 
            border: 2px solid var(--line); 
            text-align: center; 
            font-weight: bold; 
            color: var(--primary); 
            font-size: 15px; 
            padding: 10px;
        } 
        .cat-title { 
            background: var(--primary); 
            color: white; 
            padding: 10px 15px; 
            border-radius: 6px; 
            margin-top: 20px; 
            font-weight: bold; 
            font-size: 15px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        } 
        .res-card { 
            border-left: 5px solid var(--accent); 
            background: #fffde7; 
            padding: 15px; 
            margin: 10px 0; 
            border-radius: 0 8px 8px 0; 
            font-size: 14px; 
            line-height: 1.6; 
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        } 
    </style>
</head>
<body>

<div class="container">
    <div class="header-title">SayaJove နဒီနက္ခတ်ဗေဒင် Master System</div>
    
    <div class="input-group"> 
        <div class="input-field">
            <label for="dob">မွေးသက္ကရာဇ်</label>
            <input type="date" id="dob" value="1985-11-08"> 
        </div>
        <div class="input-field">
            <label for="tob">မွေးချိန်</label>
            <input type="time" id="tob" value="15:03"> 
        </div>
        <div class="input-field">
            <label for="city">မွေးဖွားရာမြို့</label>
            <input type="text" id="city" list="city-list" placeholder="ဥပမာ - Yangon" value="Yangon">
            <!-- မြို့အမည်များ အလိုအလျောက် အကြံပြုပေးရန် ဒေတာစာရင်း -->
            <datalist id="city-list">
                <option value="Yangon">Yangon (ရန်ကုန်)</option>
                <option value="Mandalay">Mandalay (မန္တလေး)</option>
                <option value="Naypyidaw">Naypyidaw (နေပြည်တော်)</option>
                <option value="Bago">Bago (ပဲခူး)</option>
                <option value="Mawlamyine">Mawlamyine (မော်လမြိုင်)</option>
                <option value="Taunggyi">Taunggyi (တောင်ကြီး)</option>
                <option value="Monywa">Monywa (မုံရွာ)</option>
                <option value="Pathein">Pathein (ပုသိမ်)</option>
                <option value="Sittwe">Sittwe (စစ်တွေ)</option>
                <option value="Pyin Oo Lwin">Pyin Oo Lwin (ပြင်ဦးလွင်)</option>
                <option value="Bangkok">Bangkok (ဘန်ကောက်)</option>
                <option value="Singapore">Singapore (စင်ကာပူ)</option>
            </datalist> 
        </div>
        <button onclick="calculateNadi()">ဇာတာတွက်ချက်မည်</button> 
    </div> 

    <div class="chart-grid" id="main-chart"> 
        <div class="house" id="h11"><div class="house-id">12</div></div> 
        <div class="house" id="h0"><div class="house-id">1</div></div> 
        <div class="house" id="h1"><div class="house-id">2</div></div> 
        <div class="house" id="h2"><div class="house-id">3</div></div> 
        <div class="house" id="h10"><div class="house-id">11</div></div> 
        <div class="center-box">နဒီနက္ခတ်ဗေဒင်<br><span style="color:var(--accent); font-size:12px; background:var(--primary); padding:2px 8px; border-radius:10px; margin-top:5px;">Master System</span></div> 
        <div class="house" id="h3"><div class="house-id">4</div></div> 
        <div class="house" id="h9"><div class="house-id">10</div></div> 
        <div class="house" id="h4"><div class="house-id">5</div></div> 
        <div class="house" id="h8"><div class="house-id">9</div></div> 
        <div class="house" id="h7"><div class="house-id">8</div></div> 
        <div class="house" id="h6"><div class="house-id">7</div></div> 
        <div class="house" id="h5"><div class="house-id">6</div></div> 
    </div> 

    <div id="result-area"></div> 
</div>

<script>
const owners = { Sun:[4], Moon:[3], Mars:[0,7], Mercury:[2,5], Jupiter:[8,11], Venus:[1,6], Saturn:[9,10] };
const maleficsList = ['Saturn', 'Mars', 'Rahu', 'Ketu'];
const beneficsList = ['Jupiter', 'Venus', 'Mercury', 'Moon'];

// မြို့အလိုက် တည်နေရာပြ Coordinates Database (ဆရာ့လိုအပ်ချက်အရ ဖြည့်စွက်နိုင်ပါသည်)
const cityDatabase = {
    "yangon": { lat: 16.8409, lon: 96.1735, tz: 6.5 },
    "mandalay": { lat: 21.9588, lon: 96.0891, tz: 6.5 },
    "naypyidaw": { lat: 19.7633, lon: 96.0785, tz: 6.5 },
    "bago": { lat: 17.3353, lon: 96.4814, tz: 6.5 },
    "mawlamyine": { lat: 16.4867, lon: 97.6283, tz: 6.5 },
    "taunggyi": { lat: 20.7884, lon: 97.0337, tz: 6.5 },
    "monywa": { lat: 22.1142, lon: 95.1324, tz: 6.5 },
    "pathein": { lat: 16.7840, lon: 94.7314, tz: 6.5 },
    "sittwe": { lat: 20.1422, lon: 92.8942, tz: 6.5 },
    "pyin oo lwin": { lat: 22.0362, lon: 96.4674, tz: 6.5 },
    "bangkok": { lat: 13.7563, lon: 100.5018, tz: 7.0 },
    "singapore": { lat: 1.3521, lon: 103.8198, tz: 8.0 }
};

async function calculateNadi() { 
    const dob = document.getElementById('dob').value; 
    const tob = document.getElementById('tob').value; 
    const cityInput = document.getElementById('city').value.trim().toLowerCase();
    const resArea = document.getElementById('result-area'); 
    
    resArea.innerHTML = "<p style='text-align:center; font-weight:bold; color:var(--primary);'>တွက်ချက်နေပါသည်...</p>"; 
    
    // ရွေးချယ်လိုက်သော မြို့၏ Geo-data ကို ရှာဖွေခြင်း (မတွေ့ပါက Default အဖြစ် ရန်ကုန်မြို့ သတ်မှတ်သည်)
    const cityData = cityDatabase[cityInput] || cityDatabase["yangon"];
    
    try { 
        // API သို့ ရက်စွဲ၊ အချိန်၊ Latitude၊ Longitude နှင့် Timezone တို့ကို တပြိုင်တည်း ပေးပို့ခြင်း
        const queryParams = `dob=${dob}&tob=${tob}&lat=${cityData.lat}&lon=${cityData.lon}&tz=${cityData.tz}`;
        const response = await fetch(`/api/calc?${queryParams}`); 
        const data = await response.json(); 
        if (data.error) throw new Error(data.error); 
        
        for(let i=0; i<12; i++) { 
            document.getElementById(`h${i}`).innerHTML = `<div class="house-id">${i+1}</div>`; 
        } 
        
        const pAbbr = {Sun:'Su', Moon:'Mo', Mars:'Ma', Mercury:'Me', Jupiter:'Ju', Venus:'Ve', Saturn:'Sa', Rahu:'Ra', Ketu:'Ke', Ascendant:'As'}; 
        
        Object.entries(data.positions).forEach(([p, deg]) => { 
            const sign = Math.floor(deg / 30); 
            if(document.getElementById(`h${sign}`)) { 
                let typeClass = "p-neutral";
                if(maleficsList.includes(p)) typeClass = "p-malefic";
                if(beneficsList.includes(p)) typeClass = "p-benefic";
                
                document.getElementById(`h${sign}`).innerHTML += `<span class="p-tag ${typeClass}">${pAbbr[p] || p} ${Math.floor(deg%30)}°</span>`; 
            } 
        }); 
        
        runNadiLogic(data.positions, cityInput); 
    } catch(e) { 
        resArea.innerHTML = "<div class='res-card' style='color:var(--malefic); font-weight:bold;'>Error: " + e.message + "</div>"; 
    } 
}

function runNadiLogic(pos, cityName) { 
    let resultHTML = ""; 
    let chart = {}; 
    
    Object.entries(pos).forEach(([p, deg]) => { 
        chart[p] = { house: Math.floor(deg / 30), degree: deg % 30 }; 
    }); 

    const isAspect = (p1, p2) => { 
        if (!chart[p1] || !chart[p2]) return false; 
        let diff = (chart[p2].house - chart[p1].house + 12) % 12; 
        return [0, 4, 8, 2, 6, 10].includes(diff); 
    }; 

    const isInterchange = (p1, p2) => { 
        if (!chart[p1] || !chart[p2]) return false; 
        return owners[p1]?.includes(chart[p2].house) && owners[p2]?.includes(chart[p1].house); 
    }; 

    const isSameHouse = (p1, p2) => { 
        if (!chart[p1] || !chart[p2]) return false; 
        return chart[p1].house === chart[p2].house; 
    }; 

    const getDistFromJupiter = (planet) => { 
        if (!chart['Jupiter'] || !chart[planet]) return 0; 
        let jPos = chart['Jupiter'].house; 
        let pPos = chart[planet].house; 
        return (pPos - jPos + 12) % 12 + 1; 
    }; 

    const getMaleficScore = () => { 
        let score = 0; 
        if (!chart) return 0; 
        if (isSameHouse('Moon', 'Rahu')) score += 30; 
        if (isSameHouse('Moon', 'Saturn')) score += 20; 
        if (isSameHouse('Moon', 'Mars')) score += 20; 
        if (isSameHouse('Jupiter', 'Rahu')) score += 25; 
        if (isSameHouse('Jupiter', 'Ketu')) score += 15; 
        if (isSameHouse('Mars', 'Saturn')) score += 30; 
        if (isSameHouse('Sun', 'Ketu')) score += 15; 
        return score; 
    }; 

    // --- ဟောချက်များ Array ---
    const effects = [
        { cat: "info", check: () => true, text: `📍 <b>မွေးဖွားရာဒေသဆိုင်ရာ အချက်အလက်:</b> ဤဇာတာရှင်သည် <b>${cityName.toUpperCase()}</b> မြို့တွင် မွေးဖွားခဲ့သဖြင့် မြို့၏ လောင်ဂျီတွဒ်နှင့် လတ္တီတွဒ်များကို အခြေခံ၍ လဂ်ဒီဂရီနှင့် နက္ခတ်များကို အတိကျဆုံး တွက်ချက်ထားပါသည်။` },
        { cat: "family", check: () => isAspect('Moon', 'Rahu'), text: "<b>တနင်္လာ+ရာဟု</b> မိခင်ဖြစ်သူမှာ ဇာတာရှင်မွေးစတွင် ကျန်းမာရေး အားနည်းတတ်ခြင်း သို့မဟုတ် စိတ်သောက ရောက်တတ်သည်။" },
        { cat: "career", check: () => isAspect('Saturn', 'Ketu'), text: "<b>စနေ+ကိတ်</b> အလုပ်အကိုင်တွင် ရုတ်တရက် အပြောင်းအလဲများ သို့မဟုတ် ဝိညာဉ်ရေးရာနှင့် ပတ်သက်သော အလုပ်များ အကျိုးပေးမည်။" },
        { cat: "fortune", check: () => isAspect('Jupiter', 'Venus') && isAspect('Jupiter', 'Mercury'), text: "<b>ဓနသိဒ္ဓိယောဂ</b> ငွေကြေးကံ အလွန်ကောင်းမွန်ပြီး ပညာရှိများ၏ အကူအညီ ရရှိမည်။" },
        { cat: "marriage", check: () => isAspect('Venus', 'Ketu'), text: "<b>သောကြာ+ကိတ်</b> အမျိုးသားဇာတာရှင်အတွက် အိမ်ထောင်ဖက်မှာ ဘာသာတရား ကိုင်းရှိုင်းသူ ဖြစ်တတ်သည်။" },
        { cat: "fortune", check: () => isAspect('Sun', 'Jupiter'), text: "<b>တနင်္ဂနွေ+ကြာသပတေး</b> အစိုးရ သို့မဟုတ် အကြီးအကဲများ၏ အထောက်အပံ့ ရရှိမည်။ ဂုဏ်သိက္ခာကြီးမားသူဖြစ်မည်။" },
        { cat: "fortune", check: () => isAspect('Jupiter', 'Venus'), text: "<b>ကြာသပတေး+သောကြာ</b> ကြီးပွားချမ်းသာမည့် ဇာတာရှင်ဖြစ်သည်။ အိမ်၊ ခြံ၊ မြေ ကံကောင်းတတ်သည်။" },
        { cat: "career", check: () => isAspect('Saturn', 'Jupiter'), text: "<b>စနေ+ကြာသပတေး</b> အလုပ်အကိုင်တွင် ဆရာတစ်ဆူ ဖြစ်တတ်သည်။ တာဝန်ကြီးသော ရာထူးများ ရရှိမည်။" },
        { cat: "spiritual", check: () => isAspect('Jupiter', 'Ketu'), text: "<b>ကြာသပတေး+ကိတ်</b> တရားထူး၊ တရားမြတ်များ ရရှိတတ်သည်။ လောကုတ္တရာ ပညာတွင် အလွန်ထူးချွန်မည်။" },
        { cat: "fortune", check: () => isAspect('Jupiter', 'Moon'), text: "<b>ဂဇကေသရီယုဂ် (Gaja-Kesari Yoga)</b> ကြာသပတေးနှင့် တနင်္လာတို့ ဆက်သွယ်မှုရရှိခြင်းကြောင့် ဖြစ်ပေါ်လာသော အလွန်မွန်မြတ်သည့် ယုဂ်ဖြစ်သည်။ ဤဇာတာရှင်သည် ဆင်ဖြူတော်နှင့် ခြင်္သေ့မင်းတို့ကဲ့သို့ အဖျက်အဆီးဟူသမျှကို ကျော်လွှားနိုင်သော ဩဇာအာဏာရှိမည်။" },
        { cat: "warning", check: () => getMaleficScore() >= 50, text: "<b style='color:red;'>⚠️ အထူးသတိပြုရန် - အဆိုးလွှမ်းမိုးမှုကြီးမားသောဇာတာ:</b> ဤဇာတာတွင် အတွင်းစိတ်ဓာတ်နှင့် အကျင့်စာရိတ္တကို ဖျက်ဆီးမည့် အဆိုးဂြိုဟ်များ၏ လွှမ်းမိုးမှုက အားကောင်းနေနိုင်ပါသည်။" },
        { cat: "fortune", check: () => getDistFromJupiter('Rahu') === 1, text: "<b>ရာဟုသည် ကြာသပတေးနှင့်အတူရှိနေခြင်း (၁ အိမ်မြောက်):</b> ဇာတာရှင်သည် အလွန်ဉာဏ်ကောင်းသော်လည်း စိတ်ကူးယဉ်ဆန်ခြင်း၊ လျှို့ဝှက်ချက်များပြားခြင်းနှင့် ဘဝအစပိုင်းတွင် အခက်အခဲများ ကြုံရတတ်သည်။" }
    ]; 

    let catNames = { 
        info: "🗺️ ဒေသန္တရ အချက်အလက်",
        fortune: "✨ ကံကြမ္မာနှင့် ယုဂ်များ", 
        career: "💼 အလုပ်အကိုင်နှင့် Сီးပွားရေး", 
        marriage: "❤️ အိမ်ထောင်ရေးနှင့် လူမှုရေး", 
        family: "🏡 မိသားစုရေးရာ", 
        spiritual: "🧘 ဝိညာဉ်ရေးရာနှင့် ပါရမီ",
        warning: "⚠️ သတိပြုရန် အချက်များ" 
    }; 

    Object.keys(catNames).forEach(c => { 
        let filtered = effects.filter(e => e.cat === c && e.check()); 
        if(filtered.length > 0) { 
            resultHTML += `<div class="cat-title">${catNames[c]}</div>`; 
            filtered.forEach(f => { 
                resultHTML += `<div class="res-card">${f.text}</div>`; 
            }); 
        } 
    }); 

    document.getElementById('result-area').innerHTML = resultHTML || "<p style='text-align:center; padding:20px;'>ယခုဇာတာအတွက် ထူးခြားသော နဒီယောဂများ မတွေ့ရှိသေးပါ။</p>"; 
}

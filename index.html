
<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SayaJove Nadi Astrology</title>
    <style>
        :root { --primary: #1a237e; --accent: #ffd600; --bg: #f5f5f5; --line: #333; }
        body { font-family: sans-serif; background: var(--bg); padding: 10px; }
        .container { max-width: 600px; margin: auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        
        /* 🔑 Activation Screen Styling */
        #activation-screen { text-align: center; padding: 20px 10px; }
        .key-box { background: #e3f2fd; padding: 12px; font-family: monospace; font-size: 18px; font-weight: bold; border: 2px dashed #1a237e; border-radius: 6px; margin: 15px 0; color: #0d47a1; letter-spacing: 1px; }
        
        /* 🔮 Main App Styling (Hidden Content) */
        #main-app-content { display: none; }
        
        .chart-grid { display: grid; grid-template-columns: repeat(4, 1fr); border: 2px solid var(--line); margin: 20px 0; }
        .house { border: 1px solid var(--line); height: 80px; padding: 5px; font-size: 11px; position: relative; background: #fff; }
        .house-id { position: absolute; bottom: 2px; right: 4px; color: #eee; font-weight: bold; }
        .p-tag { color: #0d47a1; font-weight: bold; display: block; margin-bottom: 2px; }
        .center-box { grid-column: 2 / 4; grid-row: 2 / 4; display: flex; align-items: center; justify-content: center; background: #f8f9fa; border: 1px solid var(--line); text-align: center; font-weight: bold; color: var(--primary); font-size: 14px; }
        .cat-title { background: #1a237e; color: white; padding: 8px; border-radius: 5px; margin-top: 15px; font-weight: bold; }
        .res-card { border-left: 5px solid var(--accent); background: #fffde7; padding: 12px; margin: 8px 0; border-radius: 4px; font-size: 14px; line-height: 1.6; }
        button { width: 100%; background: #1b5e20; color: white; border: none; padding: 15px; border-radius: 8px; cursor: pointer; font-size: 16px; margin-top: 10px; font-weight: bold; }
        button.btn-blue { background: #1a237e; }
        button:hover { opacity: 0.9; }
        .input-group { display: flex; flex-wrap: wrap; gap: 10px; justify-content: space-between; margin-bottom: 15px; }
        input { padding: 12px; border: 1px solid #ccc; border-radius: 5px; width: 46%; box-sizing: border-box; font-size: 14px; }
        .full-width { width: 100%; }
    </style>
</head>
<body>

<div class="container">
    
    <!-- ================= 🔑 လိုင်စင်တောင်းခံသည့် မျက်နှာပြင် ================= -->
    <div id="activation-screen">
        <h2 style="color:var(--primary); margin-bottom: 5px;">လိုင်စင်သတ်မှတ်ရန်</h2>
        <p style="color:#666; font-size:14px;">အောက်ပါ စက်ကုဒ်ကို ဆရာ့ဆီသို့ ပေးပို့၍ လိုင်စင် Key တောင်းခံပါ၊၊</p>
        
        <div class="key-box" id="request-key-display">Loading...</div>
        
        <input type="text" id="activation_key_input" placeholder="ဆရာ့ထံမှရသော လိုင်စင် Key ကို ထည့်ပါ" class="full-width" style="text-align: center; text-transform: uppercase;">
        <button class="btn-blue" onclick="validateActivationKey()">လိုင်စင် အသက်သွင်းမည်</button>
        <div id="activation-error" style="color:red; margin-top:10px; font-size:14px; font-weight:bold;"></div>
    </div>

    <!-- ================= 🔮 ဗေဒင်တွက်ချက်သည့် မူလဗဟိုမျက်နှာပြင် (လိုင်စင်မှန်မှ ပေါ်မည်) ================= -->
    <div id="main-app-content">
        <h2 style="text-align:center; color:var(--primary);">SayaJove နဒီနက္ခတ်ဗေဒင်</h2>
        
        <div class="input-group">
            <input type="date" id="dob" value="1985-11-08">
            <input type="time" id="tob" value="15:03">
            <input type="text" id="city" placeholder="မွေးဖွားရာမြို့ (ဥပမာ - ရန်ကုန်)" class="full-width">
            <button onclick="calculateLocalNadi()">ဇာတာတွက်ချက်မည်</button>
        </div>

        <div class="chart-grid" id="main-chart">
            <!-- ဗေဒင်အိမ် ၁၂ အိမ် -->
            <div class="house" id="h11"><div class="house-id">12</div></div>
            <div class="house" id="h0"><div class="house-id">1</div></div>
            <div class="house" id="h1"><div class="house-id">2</div></div>
            <div class="house" id="h2"><div class="house-id">3</div></div>
            <div class="house" id="h10"><div class="house-id">11</div></div>
            <div class="center-box">နဒီနက္ခတ်ဗေဒင်<br>Master System</div>
            <div class="house" id="h3"><div class="house-id">4</div></div>
            <div class="house" id="h9"><div class="house-id">10</div></div>
            <div class="house" id="h4"><div class="house-id">5</div></div>
            <div class="house" id="h8"><div class="house-id">9</div></div>
            <div class="house" id="h7"><div class="house-id">8</div></div>
            <div class="house" id="h6"><div class="house-id">7</div></div>
            <div class="house" id="h5"><div class="house-id">6</div></div>
        </div>
        
        <div id="result-area"></div>
    </div>
</div>

<script>
const SECRET_SALT = 8491; 

function generateRequestKey() {
    let id = localStorage.getItem('jove_device_id');
    if (!id) {
        id = Math.floor(10000 + Math.random() * 90000).toString();
        localStorage.setItem('jove_device_id', id);
    }
    document.getElementById('request-key-display').innerText = "JOVE-" + id;
}

window.onload = function() {
    generateRequestKey();
    if (localStorage.getItem('app_licensed') === 'true') {
        showMainApp();
    }
};

function validateActivationKey() {
    const inputKey = document.getElementById('activation_key_input').value.trim().toUpperCase();
    const deviceId = localStorage.getItem('jove_device_id');
    const expectedKey = "KEY-" + (parseInt(deviceId) * 3 + SECRET_SALT);

    if (inputKey === expectedKey) {
        localStorage.setItem('app_licensed', 'true');
        showMainApp();
    } else {
        document.getElementById('activation-error').innerText = "❌ လိုင်စင် Key မှားယွင်းနေပါသည်။ ပြန်လည်စစ်ဆေးပါ။";
    }
}

function showMainApp() {
    document.getElementById('activation-screen').style.display = 'none';
    document.getElementById('main-app-content').style.display = 'block';
}

const owners = { Sun:[4], Moon:[3], Mars:[0,7], Mercury:[2,5], Jupiter:[8,11], Venus:[1,6], Saturn:[9,10] };

// ✨ ရှင်းလင်းသန့်စင်ပြီးသား ဗေဒင်တွက်ချက်မှု Function စစ်စစ်
async function calculateLocalNadi() {
    const dob = document.getElementById('dob').value;
    const tob = document.getElementById('tob').value;
    const city = document.getElementById('city').value;
    const resArea = document.getElementById('result-area');

    resArea.innerHTML = "<p style='text-align:center;'>တွက်ချက်နေပါသည်...</p>";

    try {
        const response = await fetch(`/api/calc?dob=${dob}&tob=${tob}&city=${encodeURIComponent(city)}`);
        if (!response.ok) throw new Error("ဒေတာရယူမှု အဆင်မပြေပါ။");
        const data = await response.json();
        if (data.error) throw new Error(data.error);

        for(let i=0; i<12; i++) {
            document.getElementById(`h${i}`).innerHTML = `<div class="house-id">${i+1}</div>`;
        }

        const pAbbr = {Sun:'Su', Moon:'Mo', Mars:'Ma', Mercury:'Me', Jupiter:'Ju', Venus:'Ve', Saturn:'Sa', Rahu:'Ra', Ketu:'Ke', Ascendant:'As'};
        Object.entries(data.positions).forEach(([p, deg]) => {
            const sign = Math.floor(deg / 30);
            if(document.getElementById(`h${sign}`)) {
                document.getElementById(`h${sign}`).innerHTML += `<span class="p-tag">${pAbbr[p] || p} ${Math.floor(deg%30)}°</span>`;
            }
        });

        // 🎯 Python (Server) ဘက်မှ တွက်ချက်ပေးလိုက်သော တိကျသေချာသည့် အဟောများကို တိုက်ရိုက် ပြသခြင်း
        resArea.innerHTML = data.result_html;

    } catch(e) {
        resArea.innerHTML = "<div class='res-card' style='color:red;'>⚠️ " + e.message + "</div>";
    }
}

// 📦 မူလ HTML ထဲက အဟောဟောင်းများကို လုံးဝ မပျက်စီးစေရန် ဒီအတိုင်း ဆက်လက် သိမ်းဆည်းထားခြင်း
function runNadiLogic(pos) {
    let resultHTML = "";
    let chart = {};
    Object.entries(pos).forEach(([p, deg]) => {
        chart[p] = { house: Math.floor(deg / 30), degree: deg % 30 };
    });

    const isAspect = (p1, p2) => {
        if (!chart[p1] || !chart[p2]) return false;
        let diff = (chart[p2].house - chart[p1].house + 12) % 12;
        return [0, 4, 8, 2, 6, 10].includes(diff);
    };

    const isInterchange = (p1, p2) => {
        if (!chart[p1] || !chart[p2]) return false;
        return owners[p1]?.includes(chart[p2].house) && owners[p2]?.includes(chart[p1].house);
    };

    const getDistFromJupiter = (planet) => {
        if (!chart['Jupiter'] || !chart[planet]) return 0;
        return (chart[planet].house - chart['Jupiter'].house + 12) % 12 + 1;
    };

    const isShakataPos = () => {
        if (!chart || !chart['Jupiter'] || !chart['Moon']) return false;
        let dist = (chart['Moon'].house - chart['Jupiter'].house + 12) % 12 + 1;
        return dist === 6 || dist === 8;
    };

    const isKalaSarpaYoga = () => {
        if (!chart || !chart['Rahu'] || !chart['Ketu']) return false;
        let rPos = chart['Rahu'].house; let kPos = chart['Ketu'].house;
        let planets = ['Sun', 'Moon', 'Mars', 'Mercury', 'Jupiter', 'Venus', 'Saturn'];
        let countCW = 0;
        planets.forEach(p => {
            if (chart[p]) {
                let h = chart[p].house;
                if ((rPos < kPos && h > rPos && h < kPos) || (rPos > kPos && (h > rPos || h < kPos))) countCW++;
            }
        });
        return countCW === 7 || (planets.length - countCW) === 7;
    };

    const effects = [
        { cat: "family", check: () => isAspect('Moon', 'Rahu'), text: "<b>တနင်္လာ+ရာဟု</b> မိခင်ဖြစ်သူမှာ ဇာတာရှင်မွေးစတွင် ကျန်းမာရေး အားနည်းတတ်ခြင်း သို့မဟုတ် Сိတ်သောက ရောက်တတ်သည်။" },
        { cat: "career", check: () => isAspect('Saturn', 'Ketu'), text: "<b>စနေ+ကိတ်</b> အလုပ်အကိုင်တွင် ရုတ်တရက် အပြောင်းအလဲများ သို့မဟုတ် ဝိညာဉ်ရေးရာနှင့် ပတ်သက်သော အလုပ်များ အကျိုးပေးမည်။" },
        { cat: "fortune", check: () => isAspect('Jupiter', 'Venus') && isAspect('Jupiter', 'Mercury'), text: "<b>ဓနသိဒ္ဓိယောဂ</b> ငွေကြေးကံ အလွန်ကောင်းမွန်ပြီး ပညာရှိများ၏ အကူအညီ ရရှိမည်။" },
        { cat: "marriage", check: () => isAspect('Venus', 'Ketu'), text: "<b>သောကြာ+ကိတ်</b> အမျိုးသားဇာတာရှင်အတွက် အိမ်ထောင်ဖက်မှာ ဘာသာတရား ကိုင်းရှိုင်းသူ ဖြစ်တတ်သည်။ ဇနီးသည်နှင့် ဆက်ဆံရေး အေးစက်တတ်သည်။" },
        { cat: "career", check: () => isInterchange('Mars', 'Mercury'), text: "<b>အင်္ဂါ+ဗုဒ္ဓဟူး (အိမ်ဖလှယ်ခြင်း)</b> စကားပြောဆိုရာတွင် အလွန်ထက်မြက်ပြီး နည်းပညာဖြင့် အောင်မြင်မည်။" },
        { cat: "fortune", check: () => isAspect('Sun', 'Jupiter'), text: "<b>တနင်္ဂနွေ+ကြာသပတေး</b> အစိုးရ သို့မဟုတ် အကြီးအကဲများ၏ အထောက်အပံ့ ရရှိမည်။" },
        { cat: "fortune", check: () => isAspect('Jupiter', 'Venus'), text: "<b>ကြာသပတေး+သောကြာ</b> ကြီးပွားချမ်းသာမည့် ဇာတာရှင်ဖြစ်သည်။ အိမ်၊ ခြံ၊ မြေ ကံကောင်းတတ်သည်။" },
        { cat: "fortune", check: () => isAspect('Jupiter', 'Moon'), text: "<b>ကြာသပတေး+တနင်္လာ</b> စိတ်သဘောထား နူးညံ့ပြီး ခရီးသွားခြင်းဖြင့် ကံကောင်းတတ်သည်။" },
        { cat: "fortune", check: () => isAspect('Mercury', 'Venus'), text: "<b>ဗုဒ္ဓဟူး+သောကြာ:</b> ပညာဉာဏ် ထက်မြက်ပြီး စီးပွားရေးတွင် အောင်မြင်မည်။" },
        { cat: "career", check: () => isAspect('Saturn', 'Jupiter'), text: "<b>စနေ+ကြာသပတေး</b> အလုပ်အကိုင်တွင် ဆရာတစ်ဆူ ဖြစ်တတ်သည်။ တာဝန်ကြီးသော ရာထူးများ ရရှိမည်။" },
        { cat: "spiritual", check: () => isAspect('Jupiter', 'Ketu'), text: "<b>ကြာသပတေး+ကိတ်</b> တရားထူး၊ တရားမြတ်များ ရရှိတတ်သည်။ လောကုတ္တရာ ပညာတွင် အလွန်ထူးချွန်မည်။" },
        { cat: "spiritual", check: () => isAspect('Mercury', 'Ketu'), text: "<b>ဗုဒ္ဓဟူး+ကိတ်</b> ဗေဒင်၊ နက္خတ် သို့မဟုတ် လျှို့ဝှက်ပညာရပ်များကို အလိုလို သိမြင်တတ်သော ဉာဏ်ရှိသည်။" },
        { cat: "fortune", check: () => isKalaSarpaYoga(), text: "<b>ကာလသရ္ပယုဂ် (Kala Sarpa Yoga)</b> ဘဝတွင် အတိုက်အခံများ ကြုံရတတ်သော်လည်း ဒုတိယပိုင်းတွင် အံ့ဩဖွယ်ရာ အောင်မြင်မှု ရတတ်သည်။" },
        { cat: "fortune", check: () => isShakataPos(), text: "<b>သကပ်ယုဂ် (Shakata Yoga)</b> ဘဝသည် တက်လိုက်၊ ကျလိုက်နှင့် လှည်းဘီးကဲ့သို့ အလှည့်အပြောင်း ကြုံရတတ်သည်။" },
        { cat: "spiritual", check: () => getDistFromJupiter('Ketu') === 12, text: "<b>မုတ္တိယုဂ် (Moksha Yoga)</b> ကိတ်သည် ၁၂ တန့်တွင် ရှိသဖြင့် ဝိညာဉ်ရေးရာနှင့် လွတ်မြောက်ရာလမ်းကို ရှာဖွေမည့်သူ ဖြစ်သည်။" }
    ];

    let catNames = { fortune: "ကံကြမ္မာ", career: "အလုပ်အကိုင်", marriage: "အိမ်ထောင်ရေး", family: "မိစု", spiritual: "ဝိညာဉ်ရေးရာ" };
    Object.keys(catNames).forEach(c => {
        let filtered = effects.filter(e => e.cat === c && e.check());
        if(filtered.length > 0) {
            resultHTML += `<div class="cat-title">${catNames[c]}</div>`;
            filtered.forEach(f => { resultHTML += `<div class="res-card">${f.text}</div>`; });
        }
    });
    document.getElementById('result-area').innerHTML = resultHTML || "<p style='text-align:center; padding:20px;'>ယခုဇာတာအတွက် ထူးခြားသော နဒီယောဂများ မတွေ့ရှိသေးပါ။</p>";
}
</script>
</body>
</html>
